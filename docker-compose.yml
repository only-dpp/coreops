services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: coreops
      POSTGRES_PASSWORD: coreops
      POSTGRES_DB: coreops
    ports:
      - "5432:5432"
    volumes:
      - coreops_db:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - .:/code

  worker:
    build: .
    command: celery -A app.worker.celery:celery worker --loglevel=INFO
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/code

volumes:
  coreops_db: