services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: coreops
      POSTGRES_PASSWORD: coreops
      POSTGRES_DB: coreops
    volumes:
      - coreops_db:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    depends_on:
      - db
      - redis
    expose:
      - "8000"
    volumes:
      - .:/code
    restart: unless-stopped

  worker:
    build: .
    command: celery -A app.worker.celery:celery worker --loglevel=INFO
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/code
    restart: unless-stopped

  beat:
    build: . 
    command: celery -A app.worker.celery:celery beat --loglevel=INFO
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/code
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  coreops_db: